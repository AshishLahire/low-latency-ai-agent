# =============================================
# render.yaml - Render Blueprint Configuration
# =============================================
# This file tells Render how to deploy your app
# Upload this to your GitHub repo root

services:
  - type: web
    name: helpkart-ai-agent
    runtime: python
    plan: free  # Upgrade to starter or professional for production
    region: oregon  # Choose closest to your users
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    
    envVars:
      - key: SUPABASE_URL
        sync: false  # Set these manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_HISTORY_LENGTH
        value: "20"
      - key: RAG_MATCH_THRESHOLD
        value: "0.78"
      - key: CORS_ORIGINS
        value: "https://your-frontend-domain.com"
