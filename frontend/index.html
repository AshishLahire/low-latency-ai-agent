<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HelpKart Support</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0c0f;
    --surface: #13151a;
    --surface2: #1c1f27;
    --border: #2a2d38;
    --accent: #ff6b35;
    --accent2: #ff9a6c;
    --green: #3effa0;
    --text: #e8eaf0;
    --muted: #6b7080;
    --user-bg: #1e2030;
    --agent-bg: #161820;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo-ring {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 18px rgba(255,107,53,0.35);
    flex-shrink: 0;
  }

  .header-info h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
  .header-info p  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    margin-left: auto;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* ── Session bar ── */
  #session-bar {
    padding: 8px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }
  #session-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  #session-bar input:focus { border-color: var(--accent); }
  #session-bar input::placeholder { color: var(--muted); }
  #session-bar label { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    max-width: 78%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .msg.user .msg-label  { color: var(--accent2); }
  .msg.agent .msg-label { color: var(--green); }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 14px;
    font-weight: 400;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid #2c3050;
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg.agent .bubble {
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  /* Streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* Latency badge */
  .latency {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    padding: 2px 6px;
    background: var(--surface2);
    border-radius: 4px;
    display: inline-block;
  }

  /* ── Input area ── */
  #input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover:not(:disabled) {
    background: var(--accent2);
    transform: scale(1.05);
    box-shadow: 0 0 16px rgba(255,107,53,0.4);
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Empty state ── */
  #empty {
    margin: auto;
    text-align: center;
    color: var(--muted);
  }
  #empty .big { font-size: 36px; margin-bottom: 12px; }
  #empty h2  { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  #empty p   { font-size: 13px; }

  /* ── Typing indicator ── */
  .typing-dots {
    display: flex; gap: 4px; padding: 12px 16px;
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: dotBounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%,80%,100% { transform: translateY(0); }
    40%         { transform: translateY(-5px); background: var(--accent); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-ring">🛒</div>
  <div class="header-info">
    <h1>HelpKart Support</h1>
    <p>Powered by Kira · Groq · RAG</p>
  </div>
  <div class="status-dot"></div>
</header>

<div id="session-bar">
  <label>Email (optional):</label>
  <input id="email-input" type="email" placeholder="customer@example.com" />
</div>

<div id="messages">
  <div id="empty">
    <div class="big">👋</div>
    <h2>Hi, I'm Kira!</h2>
    <p>Your HelpKart support agent.<br/>Ask me about your orders, returns, or shipping.</p>
  </div>
</div>

<div id="input-area">
  <textarea id="msg-input" rows="1" placeholder="Type a message… (Enter to send)"></textarea>
  <button id="send-btn" title="Send">➤</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const emailEl    = document.getElementById('email-input');
  const emptyEl    = document.getElementById('empty');

  let sessionId   = null;
  let isStreaming = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Enter = send, Shift+Enter = newline
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    if (emptyEl) emptyEl.remove();

    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Kira';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function addTypingIndicator() {
    const wrap = document.createElement('div');
    wrap.className = 'msg agent';
    wrap.id = 'typing';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Kira';

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(label);
    wrap.appendChild(dots);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    const typingEl = addTypingIndicator();

    const startTime = Date.now();

    try {
      const res = await fetch('/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          customer_email: emailEl.value.trim() || null,
          message: text,
        }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let agentBubble = null;
      let buffer = '';

      typingEl.remove();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }

          if (event.type === 'session_id') {
            sessionId = event.data;
          } else if (event.type === 'token') {
            if (!agentBubble) {
              const wrap = document.createElement('div');
              wrap.className = 'msg agent';
              const label = document.createElement('div');
              label.className = 'msg-label';
              label.textContent = 'Kira';
              agentBubble = document.createElement('div');
              agentBubble.className = 'bubble';
              const cursor = document.createElement('span');
              cursor.className = 'cursor';
              agentBubble.appendChild(cursor);
              wrap.appendChild(label);
              wrap.appendChild(agentBubble);
              messagesEl.appendChild(wrap);
            }
            // Insert token before cursor
            const cursor = agentBubble.querySelector('.cursor');
            cursor.insertAdjacentText('beforebegin', event.data);
            scrollToBottom();
          } else if (event.type === 'done') {
            if (agentBubble) {
              const cursor = agentBubble.querySelector('.cursor');
              if (cursor) cursor.remove();
              // Add latency badge
              const lat = document.createElement('span');
              lat.className = 'latency';
              lat.textContent = `${Date.now() - startTime}ms`;
              agentBubble.parentElement.appendChild(lat);
            }
          } else if (event.type === 'error') {
            if (agentBubble) agentBubble.textContent = `⚠️ ${event.data}`;
          }
        }
      }
    } catch (err) {
      typingEl.remove();
      addMessage('agent', `⚠️ Connection error: ${err.message}`);
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
