<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpKart AI Support - Voice & Text Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .chat-header {
            background: #4a5568;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header .status {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .chat-header .status.connected {
            color: #48bb78;
        }
        
        .chat-header .status.disconnected {
            color: #f56565;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.user {
            align-items: flex-end;
        }
        
        .message.assistant {
            align-items: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: #4299e1;
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message.assistant .message-content {
            background: white;
            color: #2d3748;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-time {
            font-size: 11px;
            color: #718096;
            margin-top: 5px;
        }
        
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        #messageInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        #messageInput:focus {
            outline: none;
            border-color: #4299e1;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        #sendBtn {
            background: #4299e1;
            color: white;
        }
        
        #sendBtn:hover {
            background: #3182ce;
        }
        
        #voiceBtn {
            background: #48bb78;
            color: white;
            flex: 1;
        }
        
        #voiceBtn:hover {
            background: #38a169;
        }
        
        #voiceBtn.active {
            background: #f56565;
        }
        
        #voiceBtn.active:hover {
            background: #e53e3e;
        }
        
        .voice-status {
            text-align: center;
            font-size: 12px;
            color: #718096;
            min-height: 20px;
        }
        
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: #e2e8f0;
            border-radius: 10px;
            width: fit-content;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #4a5568;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            .chat-container {
                border-radius: 10px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 HelpKart AI Support</h1>
            <div id="connectionStatus" class="status disconnected">Disconnected</div>
        </div>
        
        <div id="chatMessages" class="chat-messages"></div>
        
        <div class="chat-input-container">
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <div class="input-group">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your message here..."
                    autocomplete="off"
                >
                <button id="sendBtn">
                    <span>📤</span> Send
                </button>
            </div>
            
            <button id="voiceBtn" class="voice-btn">
                <span>🎤</span> Start Voice Chat
            </button>
            
            <div id="voiceStatus" class="voice-status"></div>
        </div>
    </div>

    <script>
        // =============================================
        // HelpKart Chat Client
        // =============================================
        
        class HelpKartChat {
            constructor() {
                this.sessionId = 'session_' + Math.random().toString(36).substring(2, 15);
                this.ws = null;
                this.isConnected = false;
                this.isVoiceActive = false;
                this.recognition = null;
                this.synthesis = window.speechSynthesis;
                this.currentResponse = '';
                this.reconnectAttempts = 0;
                this.maxReconnectAttempts = 5;
                this.reconnectDelay = 1000;
                this.typingTimeout = null;
                
                // DOM elements
                this.chatMessages = document.getElementById('chatMessages');
                this.messageInput = document.getElementById('messageInput');
                this.sendBtn = document.getElementById('sendBtn');
                this.voiceBtn = document.getElementById('voiceBtn');
                this.connectionStatus = document.getElementById('connectionStatus');
                this.voiceStatus = document.getElementById('voiceStatus');
                this.errorMessage = document.getElementById('errorMessage');
                
                // Initialize
                this.initWebSocket();
                this.initEventListeners();
            }
            
            // =========================================
            // WebSocket Connection
            // =========================================
            initWebSocket() {
                const wsUrl = `ws://${window.location.hostname}:8000/ws/${this.sessionId}`;
                console.log('Connecting to:', wsUrl);
                
                try {
                    this.ws = new WebSocket(wsUrl);
                    
                    this.ws.onopen = () => {
                        console.log('WebSocket connected');
                        this.isConnected = true;
                        this.reconnectAttempts = 0;
                        this.updateConnectionStatus(true);
                        this.showError(null); // Clear any errors
                        this.addSystemMessage('Connected to HelpKart AI. How can I help you?');
                    };
                    
                    this.ws.onmessage = (event) => {
                        this.handleIncomingMessage(event.data);
                    };
                    
                    this.ws.onclose = () => {
                        console.log('WebSocket disconnected');
                        this.isConnected = false;
                        this.updateConnectionStatus(false);
                        this.handleDisconnect();
                    };
                    
                    this.ws.onerror = (error) => {
                        console.error('WebSocket error:', error);
                        this.showError('Connection error. Please check if the server is running.');
                    };
                    
                } catch (error) {
                    console.error('Failed to create WebSocket:', error);
                    this.showError('Failed to connect to server. Make sure the backend is running.');
                }
            }
            
            handleDisconnect() {
                if (this.reconnectAttempts < this.maxReconnectAttempts) {
                    this.reconnectAttempts++;
                    const delay = this.reconnectDelay * Math.pow(2, this.reconnectAttempts - 1);
                    
                    this.addSystemMessage(`Disconnected. Reconnecting in ${delay/1000} seconds... (Attempt ${this.reconnectAttempts}/${this.maxReconnectAttempts})`);
                    
                    setTimeout(() => {
                        if (!this.isConnected) {
                            console.log('Attempting to reconnect...');
                            this.initWebSocket();
                        }
                    }, delay);
                } else {
                    this.addSystemMessage('Unable to reconnect. Please refresh the page.');
                    this.showError('Connection lost. Please refresh the page.');
                }
            }
            
            // =========================================
            // Message Handling
            // =========================================
            handleIncomingMessage(data) {
                // Check for special messages
                if (data === '[END]') {
                    // End of streaming response
                    this.stopTypingIndicator();
                    return;
                }
                
                if (data === '[HEARTBEAT]') {
                    // Heartbeat - ignore
                    return;
                }
                
                // Check if this is a continuation of streaming response
                const lastMessage = this.chatMessages.lastElementChild;
                if (lastMessage && lastMessage.classList.contains('assistant') && 
                    lastMessage.querySelector('.message-time').textContent === 'typing...') {
                    
                    // Update existing message
                    const contentDiv = lastMessage.querySelector('.message-content');
                    contentDiv.innerHTML += this.escapeHtml(data);
                    
                    // Update accumulated response
                    this.currentResponse += data;
                    
                    // Speak the chunk if voice is active
                    if (this.isVoiceActive) {
                        this.speakChunk(data);
                    }
                } else {
                    // New message
                    this.currentResponse = data;
                    this.addMessage('assistant', data);
                    
                    // Speak if voice is active
                    if (this.isVoiceActive) {
                        this.speakChunk(data);
                    }
                }
                
                // Scroll to bottom
                this.scrollToBottom();
            }
            
            sendMessage(text) {
                if (!text.trim()) return;
                
                if (!this.isConnected) {
                    this.showError('Not connected to server. Please wait for reconnection.');
                    return;
                }
                
                try {
                    // Add user message to chat
                    this.addMessage('user', text);
                    
                    // Show typing indicator
                    this.showTypingIndicator();
                    
                    // Clear accumulated response
                    this.currentResponse = '';
                    
                    // Send to server
                    this.ws.send(text);
                    
                    // Clear input
                    this.messageInput.value = '';
                    
                } catch (error) {
                    console.error('Failed to send message:', error);
                    this.showError('Failed to send message. Please try again.');
                    this.stopTypingIndicator();
                }
            }
            
            // =========================================
            // UI Updates
            // =========================================
            addMessage(role, content) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`;
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = this.escapeHtml(content);
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                timeDiv.textContent = new Date().toLocaleTimeString();
                
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(timeDiv);
                this.chatMessages.appendChild(messageDiv);
                
                this.scrollToBottom();
            }
            
            addSystemMessage(text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message assistant';
                
                const contentDiv = document.createElement('div');
